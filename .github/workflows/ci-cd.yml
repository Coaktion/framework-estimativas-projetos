name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Prisma Generate
        run: npx prisma generate
      - name: Run Lint
        run: npm run lint
      - name: Run Tests
        run: npm test
      - name: Build
        run: npm run build

  deploy-zaf:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Zendesk
        run: echo "Deploying ZAF V2 apps..."
        # Adicionar aqui o comando real de deploy via zat ou zcli
